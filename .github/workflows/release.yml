name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (aarch64)
    runs-on: macos-latest
    env:
      TARGET: aarch64-apple-darwin
      ARCH: aarch64
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: release-${{ env.TARGET }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Tauri build
        run: pnpm tauri build --target ${{ env.TARGET }}

      - name: Rename .dmg
        run: |
          DMG_DIR="src-tauri/target/${{ env.TARGET }}/release/bundle/dmg"
          if [ ! -d "$DMG_DIR" ]; then
            echo "::error::Expected DMG dir not found: $DMG_DIR"
            exit 1
          fi
          SRC=$(ls "$DMG_DIR"/*.dmg | head -n1)
          if [ -z "$SRC" ]; then
            echo "::error::No .dmg produced in $DMG_DIR"
            ls -la "$DMG_DIR"
            exit 1
          fi
          DEST="$DMG_DIR/git-explorer-macos-${{ env.ARCH }}.dmg"
          mv "$SRC" "$DEST"
          echo "DMG_PATH=$DEST" >> "$GITHUB_ENV"
          echo "Renamed: $SRC -> $DEST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-explorer-macos-${{ env.ARCH }}
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Draft release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.dmg
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
